name: Cleanup Old Articles

on:
  schedule:
    - cron: '0 3 * * *'  # 毎日午前3時
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cleanup old articles
        run: |
          python -c "
          import datetime
          from pathlib import Path
          cutoff = datetime.datetime.now() - datetime.timedelta(days=90)
          removed = 0
          for path in Path('article').glob('*.html'):
              try:
                  date_str = path.stem[:8]
                  file_date = datetime.datetime.strptime(date_str, '%Y%m%d')
                  if file_date < cutoff:
                      path.unlink()
                      removed += 1
              except ValueError:
                  continue
          print(f'Removed {removed} old articles')
          "

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Cleanup old articles [skip ci]"
          file_pattern: article/*.html
