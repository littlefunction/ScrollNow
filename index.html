<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScrollNow — ニュースのショート動画</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif; touch-action: none; }
        #feed { position: relative; width: 100vw; height: 100vh; }
        .card { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center;
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
            display: flex; flex-direction: column; justify-content: flex-start;
            opacity: 0; transform: translateY(100%) scale(0.92); pointer-events: none;
        }
        .card.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; z-index: 10; }
        .card.prev { transform: translateY(-100%) scale(0.92); opacity: 0; z-index: 1; }
        .card.next { transform: translateY(100%) scale(0.92); opacity: 0; z-index: 1; }

        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .genre-banner { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 44px; display: flex; justify-content: center; align-items: center;
            color: #fff; font-weight: 700; font-size: 16px; letter-spacing: 2px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 20;
        }

        .hook-main {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
            width: 90%; text-align: center;
            font-size: 56px; font-weight: 900; color: #fff; line-height: 1.2;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.5);
            z-index: 15; animation: hookPop 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            word-break: keep-all;
        }
        @keyframes hookPop { 0% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -60%) scale(1); opacity: 1; } }

        .summary-sub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, 50%);
            width: 85%; text-align: center;
            font-size: 24px; font-weight: 600; color: rgba(255,255,255,0.85); line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            z-index: 14;
        }

        .catch-text { 
            position: absolute; bottom: 120px; right: 24px; width: 100px;
            writing-mode: vertical-rl; text-orientation: upright;
            font-size: 80px; font-weight: 900; color: #FFD700;
            text-shadow: 0 4px 12px rgba(0,0,0,0.7); display: flex; gap: 16px;
            opacity: 0.9; z-index: 15;
        }

        .card-link {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 16px; font-weight: 600; text-decoration: none;
            background: rgba(255,255,255,0.15); padding: 10px 28px; border-radius: 24px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s; z-index: 20;
        }
        .card-link:active { transform: translateX(-50%) scale(0.95); background: rgba(255,255,255,0.25); }


        /* Phase2.5+: 広告カード専用スタイル */
        .ad-body {
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            text-align: center;
            z-index: 15;
        }
        .ad-body p {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            line-height: 1.8;
            margin: 4px 0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .ad-product-overlay {
            position: absolute;
            bottom: 160px;
            right: 24px;
            width: 80px;
            height: 80px;
            z-index: 15;
            opacity: 0.85;
            pointer-events: none;
        }
        .ad-product-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }
        .ad-cta {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #4da6ff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 4px;
            z-index: 20;
            transition: all 0.2s;
            cursor: pointer;
        }
        .ad-cta:active {
            color: #7ec8ff;
        }
        .next-preview {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-weight: 400;
            z-index: 15;
            width: 90%;
            text-align: center;
        }

        .ad-button { 
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #ff0050, #ff2d55); color: #fff;
            padding: 18px 48px; border-radius: 50px; font-size: 22px; font-weight: 800;
            text-decoration: none; z-index: 30; animation: pulse 2s infinite;
            box-shadow: 0 8px 32px rgba(255, 0, 80, 0.4);
        }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }

        #progress {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 100;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; }
        .dot.active { background: #fff; transform: scale(1.5); }
        .dot.ad { background: #ff0050; }

        #top5-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 200; display: none;
            flex-direction: column; padding: 60px 24px 24px;
            overflow-y: auto; backdrop-filter: blur(20px);
        }
        #top5-overlay.open { display: flex; }
        #top5-overlay h2 { color: #FFD700; font-size: 32px; margin-bottom: 24px; text-align: center; }
        .top5-item {
            background: rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .top5-rank { color: #FFD700; font-size: 24px; font-weight: 900; margin-right: 12px; }
        .top5-title { color: #fff; font-size: 18px; font-weight: 700; line-height: 1.4; }
        .top5-genre { color: #aaa; font-size: 13px; margin-top: 4px; }
        .close-btn {
            position: fixed; top: 20px; right: 20px; color: #fff; font-size: 28px;
            background: rgba(255,255,255,0.1); width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none;
            backdrop-filter: blur(10px); z-index: 201; cursor: pointer;
        }

        .action-bar {
            position: fixed; right: 16px; bottom: 200px;
            display: flex; flex-direction: column; gap: 16px; z-index: 50;
        }
        .action-btn {
            width: 52px; height: 52px; border-radius: 50%;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); transition: all 0.2s; cursor: pointer;
        }
        .action-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }

        #swipe-hint {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 16px; background: rgba(0,0,0,0.6);
            padding: 12px 24px; border-radius: 24px; z-index: 150;
            animation: hintFade 3s forwards; pointer-events: none;
        }
        @keyframes hintFade { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }

        .loop-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 48px; font-weight: 900; text-align: center;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8); line-height: 1.4;
        }
        .loop-sub { font-size: 24px; color: #aaa; margin-top: 16px; font-weight: 400; }

        /* Phase2+: TOP5ランキングカード用 */
        .top5-hint {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: #FFD700; font-size: 18px; font-weight: 700;
            background: rgba(255, 215, 0, 0.15); padding: 12px 32px; border-radius: 28px;
            border: 1px solid rgba(255, 215, 0, 0.3); backdrop-filter: blur(10px);
            cursor: pointer; z-index: 20; animation: pulse 2s infinite;
        }
        .top5-hint:active { transform: translateX(-50%) scale(0.95); background: rgba(255, 215, 0, 0.25); }
    </style>
<base target="_blank">
</head>
<body>
    <div id="feed"><div class="card" data-type="top5" style="background-image: url('assets/default.png')"><div class="genre-banner" style="background-color: #FFD700">🔥 TOP5</div><div class="hook-main">ランキングを見る</div><div class="summary-sub">🔥 今日の重要ニュース
次の更新まであと35分</div><div class="catch-text"><span>タップして</span><span>確認</span></div><div class="top5-hint" onclick="openTop5()">タップしてランキングを見る →</div></div></div>

    <div id="progress"></div>

    <div class="action-bar">
        <button class="action-btn" onclick="openTop5()" title="今日の重要ニュース">🔥</button>
        <button class="action-btn" onclick="shareCurrent()" title="シェア">🔗</button>
        <button class="action-btn" onclick="toggleAutoPlay()" title="自動再生">▶️</button>
    </div>

    <div id="swipe-hint">↑ スワイプして次へ</div>

    <div id="top5-overlay">
        <button class="close-btn" onclick="closeTop5()">✕</button>
        <h2>🔥 今日の重要ニュース TOP5</h2>
        <div id="top5-list"></div>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const progress = document.getElementById('progress');
        let current = 0;
        let autoPlay = false;
        let autoPlayTimer = null;
        const totalCards = cards.length;

        cards.forEach((c, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (c.querySelector('.ad-button') ? ' ad' : '');
            progress.appendChild(dot);
        });
        const dots = document.querySelectorAll('.dot');

        function update() {
            cards.forEach((c, i) => {
                c.classList.remove('active', 'prev', 'next');
                if (i === current) c.classList.add('active');
                else if (i < current) c.classList.add('prev');
                else c.classList.add('next');
            });
            dots.forEach((d, i) => d.classList.toggle('active', i === current));
            localStorage.setItem('scrollnow_lastIndex', current);
        }

        function next() {
            if (current < totalCards - 1) {
                current++;
                update();
                // Phase2+: 最後のカード（TOP5）に到達したら自動でランキング表示
                if (current === totalCards - 1) {
                    setTimeout(openTop5, 800);
                }
            } else {
                current = 0;
                update();
            }
        }
        function prev() {
            if (current > 0) {
                current--;
                update();
            }
        }

        let startY = 0, startTime = 0;
        document.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            startTime = Date.now();
        }, {passive: true});
        document.addEventListener('touchend', e => {
            const diff = startY - e.changedTouches[0].clientY;
            const duration = Date.now() - startTime;
            if (Math.abs(diff) > 50 && duration < 300) {
                if (diff > 0) next();
                else prev();
            }
        }, {passive: true});

        let wheelLock = false;
        document.addEventListener('wheel', e => {
            if (wheelLock) return;
            wheelLock = true;
            setTimeout(() => wheelLock = false, 400);
            if (e.deltaY > 0) next();
            else prev();
        }, {passive: true});

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); prev(); }
        });

        function toggleAutoPlay() {
            autoPlay = !autoPlay;
            if (autoPlay) {
                autoPlayTimer = setInterval(next, 5000);
                document.querySelector('.action-btn:last-child').textContent = '⏸';
            } else {
                clearInterval(autoPlayTimer);
                document.querySelector('.action-btn:last-child').textContent = '▶️';
            }
        }

        const top5Data = [];
        function openTop5() {
            const list = document.getElementById('top5-list');
            list.innerHTML = top5Data.map((item, i) => `
                <div class="top5-item" onclick="window.open('${item.url}', '_blank')">
                    <span class="top5-rank">${i+1}</span>
                    <span class="top5-title">${item.title}</span>
                    <div class="top5-genre">${item.genre} · ${item.emotion || 'news'} · 保存価値: ${item.score}</div>
                </div>
            `).join('');
            document.getElementById('top5-overlay').classList.add('open');
        }
        function closeTop5() {
            document.getElementById('top5-overlay').classList.remove('open');
        }

        function shareCurrent() {
            const card = cards[current];
            const genre = card.querySelector('.genre-banner').textContent.trim();
            const hook = card.querySelector('.hook-main').textContent.trim();
            const text = `${genre} — ${hook.substring(0, 30)}... ScrollNowでチェック！`;
            if (navigator.share) {
                navigator.share({ title: 'ScrollNow', text: text, url: location.href });
            } else {
                navigator.clipboard.writeText(text + ' ' + location.href);
                alert('クリップボードにコピーしました');
            }
        }

        setTimeout(() => {
            const hint = document.getElementById('swipe-hint');
            if (hint) hint.remove();
        }, 4000);

        const saved = localStorage.getItem('scrollnow_lastIndex');
        if (saved && parseInt(saved) < totalCards) {
            current = parseInt(saved);
        }
        update();
    </script>
</body>
</html>
