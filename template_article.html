<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — ScrollNow</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="robots" content="index, follow">

    <!-- OGP -->
    <meta property="og:title" content="{{HOOK}} — {{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="{{OG_IMAGE}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{CANONICAL_URL}}">
    <meta property="article:published_time" content="{{DATE_PUBLISHED}}">
    <meta property="article:modified_time" content="{{DATE_MODIFIED}}">
    <meta property="article:section" content="{{GENRE}}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{HOOK}} — {{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="{{OG_IMAGE}}">

    <!-- NewsArticle JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "{{TITLE}}",
      "description": "{{DESCRIPTION}}",
      "datePublished": "{{DATE_PUBLISHED}}",
      "dateModified": "{{DATE_MODIFIED}}",
      "author": {
        "@type": "Organization",
        "name": "ScrollNow"
      },
      "publisher": {
        "@type": "NewsMediaOrganization",
        "name": "ScrollNow",
        "logo": {
          "@type": "ImageObject",
          "url": "https://littlefunction.github.io/ScrollNow/assets/default.png"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{CANONICAL_URL}}"
      },
      "image": {
        "@type": "ImageObject",
        "url": "{{OG_IMAGE}}"
      },
      "articleSection": "{{GENRE}}"
    }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
            line-height: 1.8;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .back-link {
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 32px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }
        .genre-tag {
            display: inline-block;
            background: {{GENRE_COLOR}};
            color: #fff;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .hook {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 24px;
            color: #fff;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            color: #ccc;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #333;
        }
        .summary {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 32px;
            line-height: 1.8;
        }
        .source {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .source-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .source a {
            color: #4da6ff;
            text-decoration: none;
            font-size: 16px;
            word-break: break-all;
        }
        .source a:hover { text-decoration: underline; }
        .meta {
            font-size: 12px;
            color: #555;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #222;
        }
        .emotion-badge {
            display: inline-block;
            background: #222;
            color: #888;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← ScrollNow フィードに戻る</a>

    <div class="genre-tag">{{GENRE_EMOJI}} {{GENRE}}</div>

    <h1 class="hook">{{HOOK}}</h1>

    <div class="title">{{TITLE}}</div>

    <div class="summary">{{SUMMARY}}</div>

    <div class="source">
        <div class="source-label">出典</div>
        <a href="{{SOURCE_URL}}" target="_blank" rel="noopener">{{SOURCE_NAME}} — {{SOURCE_URL}}</a>
    </div>

    <div class="meta">
        公開: {{DATE_DISPLAY}}
        <span class="emotion-badge">感情: {{EMOTION}}</span>
        <span class="emotion-badge">保存価値: {{SCORE}}</span>
    </div>
</body>
</html>
